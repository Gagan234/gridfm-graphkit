# Factorized spatio-temporal masked reconstruction — topology (k-hop) masking on case118_ieee.
#
# Topology masking is the masking strategy with no direct precedent in
# the spatio-temporal MAE literature, and the most theoretically
# distinctive contribution of this thesis. It picks an anchor bus and
# masks the entire k-hop graph neighborhood around it. The masked
# region is therefore always a connected sub-graph in the bus
# connectivity, mirroring how real grid faults propagate (substation
# outages, line contingencies). The factorized model needs both its
# spatial layers (to infer the missing region from neighbors *outside*
# the k-hop ball) and its temporal layers (to use the unmasked time
# context for the affected buses, when the contingency would otherwise
# be partially observable in time).

callbacks:
  patience: 100
  tol: 0

task:
  task_name: TemporalReconstruction

masking:
  strategy: topology
  hop_count: 2
  anchor_strategy: random_bus

data:
  baseMVA: 100
  mask_value: 0.0
  normalization: HeteroDataMVANormalizer
  networks:
    - case118_ieee
  scenarios:
    - 50
  test_ratio: 0.1
  val_ratio: 0.1
  workers: 2
  split_by_load_scenario_idx: true
  window_size: 6
  window_stride: 1

model:
  type: FactorizedSpatioTemporalGNS_heterogeneous
  attention_head: 2
  edge_dim: 10
  hidden_size: 16
  input_bus_dim: 15
  input_gen_dim: 6
  output_bus_dim: 2
  output_gen_dim: 1
  num_layers: 2
  dropout: 0.0

optimizer:
  beta1: 0.9
  beta2: 0.999
  learning_rate: 0.0005
  lr_decay: 0.7
  lr_patience: 5

seed: 0

training:
  batch_size: 4
  epochs: 3
  loss_weights:
    - 1.0
  losses:
    - MaskedBusMSE
  loss_args:
    - {}
  accelerator: auto
  devices: auto
  strategy: auto

verbose: true
