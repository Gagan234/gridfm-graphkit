# Spatio-temporal masked reconstruction — tube masking on case118_ieee.
#
# Masks the SAME random subset of buses on every call. The subset is
# determined by `tube_seed`. Models a sustained sensor failure where
# the same buses are absent in every training sample. Different
# `tube_seed` values produce different (each individually persistent)
# subsets — useful for ablation runs across seeds.

callbacks:
  patience: 100
  tol: 0

task:
  task_name: TemporalReconstruction

masking:
  strategy: tube
  tube_rate: 0.3       # 30% of buses persistently masked
  tube_seed: 0          # change to vary which subset is masked

data:
  baseMVA: 100
  mask_value: 0.0
  normalization: HeteroDataMVANormalizer
  networks:
    - case118_ieee
  scenarios:
    - 50
  test_ratio: 0.1
  val_ratio: 0.1
  workers: 2
  split_by_load_scenario_idx: true
  window_size: 6
  window_stride: 1

model:
  type: TemporalGNS_heterogeneous
  attention_head: 2
  edge_dim: 10
  hidden_size: 16
  input_bus_dim: 15
  input_gen_dim: 6
  output_bus_dim: 2
  output_gen_dim: 1
  num_layers: 2

optimizer:
  beta1: 0.9
  beta2: 0.999
  learning_rate: 0.0005
  lr_decay: 0.7
  lr_patience: 5

seed: 0

training:
  batch_size: 4
  epochs: 3
  loss_weights:
    - 1.0
  losses:
    - MaskedBusMSE
  loss_args:
    - {}
  accelerator: auto
  devices: auto
  strategy: auto

verbose: true
