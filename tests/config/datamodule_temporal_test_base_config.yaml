# Datamodule unit-test config for the spatio-temporal pipeline.
#
# Mirrors datamodule_test_base_config.yaml but selects the
# TemporalReconstruction task so that LitGridHeteroDataModule routes through
# its temporal branch (HeteroGridTemporalDataset + AddTemporalMask). The
# scenarios value is the same 72 the static test uses; window_size=6 with
# stride=1 yields 67 windows from the 72 scenarios — enough headroom for
# train/val/test splits to land on multiple windows each.

callbacks:
  patience: 100
  tol: 0
task:
  task_name: TemporalReconstruction
masking:
  strategy: random_point
  rate: 0.5
data:
  baseMVA: 100
  mask_value: 0.0
  normalization: HeteroDataMVANormalizer
  networks:
  - case14_ieee
  scenarios:
  - 72
  test_ratio: 0.1
  val_ratio: 0.1
  workers: 1
  split_by_load_scenario_idx: true
  window_size: 6
  window_stride: 1
model:
  attention_head: 2
  edge_dim: 10
  hidden_size: 16
  input_bus_dim: 15
  input_gen_dim: 6
  output_bus_dim: 2
  output_gen_dim: 1
  num_layers: 2
  type: TemporalGNS_heterogeneous
optimizer:
  beta1: 0.9
  beta2: 0.999
  learning_rate: 0.0005
  lr_decay: 0.7
  lr_patience: 5
seed: 0
training:
  batch_size: 4
  epochs: 1
  loss_weights:
  - 1.0
  losses:
  - MaskedBusMSE
  loss_args:
  - {}
  accelerator: auto
  devices: auto
  strategy: auto
verbose: true
